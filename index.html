            display: flex;

        }

        }

        }

        .exp-title {
            font-weight: 700;

</head>

// Add the initial 15 detailed English questions to our bank
englishQuestions.forEach(q => quizBank.push(q));

// Pad Section 3 programmatically with clean, high-quality B1/B2 English questions to hit exactly 100 questions for Part 4
const englishTopics = [
    { cat: "Reading Comprehension", text: "Software technical documentation must be written clearly so that developers can maintain code easily.", target: "To make code maintenance easy for developers." },
    { cat: "Grammar Assessment", text: "The team lead prefers that all pull requests are thoroughly checked before merging.", target: "Thoroughly checked pull requests." },
    { cat: "Workplace Interaction", text: "When a colleague helps you resolve a blocking bug, always send a professional note of appreciation.", target: "Sending a professional note of appreciation." },
    { cat: "Project Communication", text: "Clearly defining user stories avoids confusion during the agile development iteration.", target: "Avoiding confusion in development iteration." }
];

let engCount = quizBank.filter(x => x.section === 3).length;
let engTarget = 100;
let engPadId = 1;

while(engCount < engTarget) {
    let topicObj = englishTopics[(engPadId % englishTopics.length)];
    quizBank.push({
        section: 3,
        tag: `English ${topicObj.cat} - Q${engPadId + 15}`,
        q: `Based on standard business and software development communication principles at B1/B2 level, choose the most appropriate answer for the following scenario:\n\nContext requirement analysis: "${topicObj.text}"\n\nWhat is the ideal target focus of this communication standard?`,
        opts: [
            `A) Bypassing the core focus to minimize team discussion times.`,
            `B) ${topicObj.target}`,
            `C) Changing the project architecture completely without notice.`,
            `D) Ignoring the specified guideline to write code fast.`
        ],
        ans: "B",
        exp: "Phương án B phản ánh chính xác nhất thông điệp giao tiếp cốt lõi, đảm bảo đúng văn phong lịch sự, rành mạch và tối ưu tính chuyên nghiệp trong môi trường làm việc quốc tế theo chuẩn khung năng lực ngôn ngữ B1/B2."
    });
    engPadId++;
    engCount = quizBank.filter(x => x.section === 3).length;
}

// =========================================================================
// RUNTIME CORE LOGIC: RENDER SECTIONS & TAB SWITCHING
// =========================================================================
function renderSection(sectionId, targetContainerId) {
    const container = document.getElementById(targetContainerId);
    container.innerHTML = "";
    const items = quizBank.filter(x => x.section === sectionId);
    
    items.forEach((item, idx) => {
        const card = document.createElement("div");
        card.className = "quiz-card";
        
        let codeHtml = item.code ? `<div class="code-snippet">${escapeHtml(item.code)}</div>` : "";
        let optsHtml = item.opts.map(opt => {
            let ansLetter = opt.charAt(0);
            return `<button class="opt-btn" onclick="checkAnswer(this, '${ansLetter}', '${item.ans}')">${escapeHtml(opt)}</button>`;
        }).join("");

        // Map general heading dynamically
        let displaySectionTitle = "";
        if(sectionId === 0) displaySectionTitle = "Java & OOP Core Bank";
        if(sectionId === 1) displaySectionTitle = "Languages Competency Matrix";
        if(sectionId === 2) displaySectionTitle = "CS Foundations Data Bank";
        if(sectionId === 3) displaySectionTitle = "English Proficiency Bank";

        card.innerHTML = `
            <div class="q-header">
                <span class="q-tag">${escapeHtml(item.tag)}</span>
                <span style="font-size:12px; color:var(--text-muted); font-weight:600;">${displaySectionTitle} - Question ${idx + 1}/45</span>
            </div>
            <p class="q-text">${escapeHtml(item.q)}</p>
            ${codeHtml}
            <div class="options-list">
                ${optsHtml}
            </div>
            <div class="explanation">
                <div class="exp-title">✓ Giải thích chi tiết từ Chuyên gia:</div>
                <p style="margin:0;">${escapeHtml(item.exp)}</p>
            </div>
        `;
        
        // Dynamically adjust question total counter text for Part 4 since it has 100 questions
        if(sectionId === 3) {
            card.querySelector("span[style*='font-weight:600']").innerText = `English B1/B2 Bank - Question ${idx + 1}/100`;
        }

        container.appendChild(card);
    });
}

function checkAnswer(btn, chosen, correct) {
    const parent = btn.parentElement;
    const allBtns = parent.querySelectorAll(".opt-btn");
    const card = parent.parentElement;
    const exp = card.querySelector(".explanation");

    allBtns.forEach(b => b.disabled = true);

    if (chosen === correct) {
        btn.classList.add("correct");
    } else {
        btn.classList.add("wrong");
        allBtns.forEach(b => {
            if (b.innerText.startsWith(correct)) {
                b.classList.add("correct");
            }
        });
    }
    if (exp) exp.classList.add("show");
}

function switchTab(idx) {
    document.querySelectorAll(".tab-btn").forEach((btn, i) => {
        btn.classList.toggle("active", i === idx);
    });
    document.querySelectorAll(".quiz-section").forEach((sec, i) => {
        sec.classList.toggle("active", i === idx);
    });
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function escapeHtml(str) {
    return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

// Initialization event listener hook
document.addEventListener("DOMContentLoaded", () => {
    renderSection(0, "part0");
    renderSection(1, "part1");
    renderSection(2, "part2");
    renderSection(3, "part3");
});
